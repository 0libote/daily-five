name: Validate release preparation

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun ci
      - name: Prepare test release files
        env:
          VERSION: 9.9.9
        run: bun scripts/prepare-release.mjs
      - run: bun run typecheck
      - run: bun run test
      - run: bun run build
      - name: Confirm release files
        run: test -f main.js && test -f manifest.json && test -f styles.css
