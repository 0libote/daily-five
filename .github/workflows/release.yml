name: Release

on:
  push:
    tags: ["*"]
    branches: ["release/v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release version
        id: release
        run: |
          RAW="$GITHUB_REF_NAME"
          RAW="${RAW#release/}"
          VERSION="${RAW#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Set version from tag
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          node -e 'const fs=require("fs"),p=require("./manifest.json"),v=require("./versions.json"); p.version=process.env.VERSION; v[p.version]=p.minAppVersion; fs.writeFileSync("manifest.json",JSON.stringify(p,null,2)+"\n"); fs.writeFileSync("versions.json",JSON.stringify(v,null,2)+"\n")'
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add package.json package-lock.json manifest.json versions.json
          git diff --cached --quiet || git commit -m "chore: release v$VERSION"
          git push origin main
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Attest release files
        uses: actions/attest@v4
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          TARGET="$(git rev-parse HEAD)"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" main.js manifest.json styles.css --clobber
          else
            gh release create "$TAG" main.js manifest.json styles.css --target "$TARGET" --generate-notes
          fi
