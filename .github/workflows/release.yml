name: Release

on:
  push:
    tags: ["*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Check tag matches manifest
        run: test "${GITHUB_REF_NAME#v}" = "$(node -p "require('./manifest.json').version")"
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" main.js manifest.json styles.css --generate-notes
