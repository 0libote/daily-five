name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, for example 0.2.4"
        required: true
        type: string
  push:
    tags: ["[0-9]*"]
    branches: ["release/*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release version
        id: release
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            RAW="$INPUT_VERSION"
          else
            RAW="$GITHUB_REF_NAME"
          fi
          RAW="${RAW#release/}"
          VERSION="${RAW#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Prepare release files
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          node - <<'NODE'
          const fs = require("fs");
          const version = process.env.VERSION;
          const manifest = require("./manifest.json");
          const versions = require("./versions.json");
          manifest.version = version;
          versions[version] = manifest.minAppVersion;
          fs.writeFileSync("manifest.json", `${JSON.stringify(manifest, null, 2)}\n`);
          fs.writeFileSync("versions.json", `${JSON.stringify(versions, null, 2)}\n`);
          NODE
      - name: Verify release version files
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const version = process.env.VERSION;
          const files = {
            "package.json": JSON.parse(fs.readFileSync("package.json", "utf8")),
            "package-lock.json": JSON.parse(fs.readFileSync("package-lock.json", "utf8")),
            "manifest.json": JSON.parse(fs.readFileSync("manifest.json", "utf8")),
            "versions.json": JSON.parse(fs.readFileSync("versions.json", "utf8"))
          };
          const checks = [
            ["package.json version", files["package.json"].version === version],
            ["package-lock.json version", files["package-lock.json"].version === version],
            ["package-lock root package version", files["package-lock.json"].packages?.[""]?.version === version],
            ["manifest.json version", files["manifest.json"].version === version],
            ["versions.json entry", files["versions.json"][version] === files["manifest.json"].minAppVersion]
          ];
          const failed = checks.filter(([, ok]) => !ok).map(([name]) => name);
          if (failed.length) {
            console.error(`Release version file check failed for ${version}:`);
            for (const name of failed) console.error(`- ${name}`);
            process.exit(1);
          }
          console.log(`Release version files verified for ${version}.`);
          NODE
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Attest release files
        uses: actions/attest@v4
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css
      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          TARGET="$(git rev-parse HEAD)"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" main.js manifest.json styles.css --clobber
          else
            gh release create "$TAG" main.js manifest.json styles.css --target "$TARGET" --generate-notes
          fi
