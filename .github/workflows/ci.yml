name: Build and test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun ci
      - run: bun run typecheck
      - run: bun run test
      - run: bun run build
      - name: Confirm release files
        run: test -f main.js && test -f manifest.json && test -f styles.css
